<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <meta name="description" content="自己紹介とポートフォリオ">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#ai">AI & Me</a></li>
                <li><a href="#future">Future</a></li>
                <li><a href="#challenge">Challenge</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero" class="fade-in">
            <div class="glass-card profile-card">
                <div class="avatar-container">
                    <img src="avatar.png" alt="プロフィール画像" class="avatar">
                </div>
                <h1>ハンドルネームはタキシード猫です。</h1>
                <p class="subtitle">Welcome to my space</p>
            </div>
        </section>

        <section id="about" class="scroll-reveal">
            <h2>About Me</h2>
            <div class="glass-card">
                <p>得意なことはプログラミングで、興味があることはAIです。</p>
            </div>
        </section>

        <section id="ai" class="scroll-reveal">
            <h2>自分にとってAIとはどういう存在か</h2>
            <div class="glass-card">
                <p>相棒のような存在です。</p>
            </div>
        </section>

        <section id="future" class="scroll-reveal">
            <h2>今後AIとどう向き合いたいか</h2>
            <div class="glass-card">
                <p>相棒のように向き合いたいです。</p>
            </div>
        </section>

        <section id="challenge" class="scroll-reveal">
            <h2>この授業を通して挑戦したいこと</h2>
            <div class="glass-card">
                <ul>
                    <li>LINEのようなアプリを作りたいです。</li>
                    <li>AIについて調べてみたいです。</li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ○○. Built with Love & AI.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
